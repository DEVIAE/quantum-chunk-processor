name: Deploy to OpenShift

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  OPENSHIFT_SERVER: https://api.rm1.0a51.p1.openshiftapps.com:6443
  OPENSHIFT_PROJECT: felipesoto-dev
  SERVICE_NAME: chunk-processor

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Build with Maven
        run: mvn clean package -DskipTests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ env.OPENSHIFT_SERVER }}
          oc project ${{ env.OPENSHIFT_PROJECT }}

      - name: Deploy shared infrastructure
        run: |
          echo "=== Deploying ActiveMQ Artemis ==="
          curl -sL -H "Authorization: token ${{ secrets.GH_PACKAGES_TOKEN }}" \
            "https://raw.githubusercontent.com/DEVIAE/quantum-common/develop/k8s/amq-broker.yaml" \
            -o /tmp/amq-broker.yaml
          oc apply -f /tmp/amq-broker.yaml
          oc rollout status deployment/amq-broker --timeout=3m || echo "AMQ broker still starting..."

          echo "=== Deploying Redis ==="
          curl -sL -H "Authorization: token ${{ secrets.GH_PACKAGES_TOKEN }}" \
            "https://raw.githubusercontent.com/DEVIAE/quantum-common/develop/k8s/redis.yaml" \
            -o /tmp/redis.yaml
          oc apply -f /tmp/redis.yaml
          oc rollout status deployment/redis --timeout=2m || echo "Redis still starting..."

      - name: Build Image
        run: |
          if oc get bc/${{ env.SERVICE_NAME }} &>/dev/null; then
            oc start-build ${{ env.SERVICE_NAME }} --from-dir=. --follow --wait
          else
            oc new-build --name=${{ env.SERVICE_NAME }} --binary --strategy=docker
            oc start-build ${{ env.SERVICE_NAME }} --from-dir=. --follow --wait
            oc new-app ${{ env.SERVICE_NAME }}
          fi

      - name: Apply Kubernetes manifests
        run: |
          oc apply -f k8s/configmap.yaml
          oc apply -f k8s/deployment.yaml
          oc apply -f k8s/service.yaml
          # Apply KEDA ScaledObject only if CRD is installed
          oc apply -f k8s/keda-scaledobject.yaml 2>/dev/null || echo "KEDA not installed, skipping ScaledObject"

      - name: Create secrets
        run: |
          # Create elastic-credentials secret (idempotent)
          oc delete secret elastic-credentials --ignore-not-found
          oc create secret generic elastic-credentials \
            --from-literal=api-key=${{ secrets.ELASTIC_API_KEY }}
          # Create amq-credentials secret if not exists
          oc get secret amq-credentials &>/dev/null || \
            oc create secret generic amq-credentials \
              --from-literal=username=admin \
              --from-literal=password=admin

      - name: Configure environment
        run: |
          oc set env deployment/${{ env.SERVICE_NAME }} \
            SPRING_PROFILES_ACTIVE=openshift || true

      - name: Wait for deployment
        run: oc rollout status deployment/${{ env.SERVICE_NAME }} --timeout=5m

      - name: Verify deployment
        run: |
          echo "=== Pods Status ==="
          oc get pods -l app=${{ env.SERVICE_NAME }}
          echo "=== Service ==="
          oc get svc ${{ env.SERVICE_NAME }}
