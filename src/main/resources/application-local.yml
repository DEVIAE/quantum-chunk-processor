# ============================================================================
# Perfil LOCAL - quantum-chunk-processor en Windows sin OpenShift
# Uso: mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# PREREQUISITO: quantum-format-normalizer debe estar corriendo primero.
#   El broker Artemis embebido de ese servicio escucha en tcp://localhost:61616.
#
# REDIS: opcional. Si no esta disponible, el servicio cae automaticamente a
#   idempotencia en memoria (no persiste entre reinicios).
# ============================================================================

spring:
  artemis:
    broker-url: tcp://localhost:61616   # broker embebido en format-normalizer
    user: admin
    password: admin

  data:
    redis:
      host: localhost
      port: 6379                        # opcional: si no corre, usa in-memory fallback

  datasource:
    url: jdbc:h2:mem:tracking;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update

processor:
  paths:
    processing-dir: E:/data/processing
    processed-dir:  E:/data/processed
    failed-dir:     E:/data/failed
    output-dir:     E:/data/output

elk:
  enabled: false

logging:
  level:
    com.quantum: DEBUG
    org.apache.activemq: WARN
    org.springframework.data.redis: WARN
