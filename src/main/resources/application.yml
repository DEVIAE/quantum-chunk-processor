spring:
  application:
    name: quantum-chunk-processor

  artemis:
    broker-url: tcp://${AMQ_HOST:localhost}:${AMQ_PORT:61616}
    user: ${AMQ_USER:admin}
    password: ${AMQ_PASSWORD:admin}

  data:
    redis:
      host: ${QUANTUM_REDIS_HOST:localhost}
      port: ${QUANTUM_REDIS_PORT:6379}
      password: ${QUANTUM_REDIS_PASSWORD:}
      timeout: 2000ms

  datasource:
    url: jdbc:h2:mem:tracking;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

processor:
  consumer:
    concurrency: ${CONSUMER_CONCURRENCY:1-5}
    prefetch: ${CONSUMER_PREFETCH:10}
  metrics:
    queue-poll-interval: ${QUEUE_POLL_INTERVAL:15000}
  paths:
    processing-dir: ${PROCESSING_DIR:/data/processing}
    processed-dir:  ${PROCESSED_DIR:/data/processed}
    failed-dir:     ${FAILED_DIR:/data/failed}
    output-dir:     ${OUTPUT_DIR:/data/output}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false
    jms:
      enabled: false
    elasticsearch:
      enabled: false
  metrics:
    tags:
      application: chunk-processor
    export:
      prometheus:
        enabled: true

server:
  port: ${SERVER_PORT:8082}

# Elasticsearch direct connection (chunk indexing)
elasticsearch:
  url: ${ELASTIC_URL:http://localhost:9200}
  api-key: ${ELASTIC_API_KEY:}

# ELK Configuration (R1, R2, R3)
elk:
  logstash:
    host: ${LOGSTASH_HOST:localhost}
    port: ${LOGSTASH_PORT:5000}
  enabled: ${ELK_ENABLED:true}

logging:
  level:
    com.quantum: INFO
    org.springframework.jms: INFO
    org.apache.activemq: WARN
  config: classpath:logback-spring.xml
